; Showcase viking.conf: every section, every alias, all the bells.
; Run `viking <command> -c viking.conf --test --dry-run` from this directory.
; (See README.md for setup and per-feature pointers.)

; -------- [personal] (required) --------
; Religion, rechtsform, besteuerungsart, kindschaftsverhaeltnis and the
; --period CLI flag all accept either German words or the original ELSTER
; numeric codes. The numerics still work; the words are easier to read.

[personal]
firstname    = Hans
lastname     = Maier
birthdate    = 05.05.1955
idnr         = 04452397687
taxnumber    = 9198011310010
street       = Musterstr.
housenumber  = 1
zip          = 10115
city         = Berlin
iban         = DE91100000000123456789
religion     = rk             ; rk, ev, altkath, ev_ref, keine, ... (or 02..29)
profession   = Software-Entwickler
kv_art       = privat         ; privat (default) or gesetzlich

; -------- [spouse] (optional, for Zusammenveranlagung) --------

[spouse]
firstname    = Greta
lastname     = Maier
birthdate    = 12.07.1956
idnr         = 04452397688
religion     = ev
profession   = Lehrerin

; -------- Income sources --------
; Section name is the "handle" you pass to viking on the CLI:
;   viking ust freelance --year 2025
;   viking euer mygewerbe --year 2025
; Reserved names: personal, spouse, auth. Everything else is inferred:
;   has `income`                   -> source
;   has `kindschaftsverhaeltnis`   -> kid

; Anlage S (Selbstaendige Arbeit). Default owner is "personal".
[freelance]
income          = freiberuf      ; gewerbe | freiberuf | kap (or 2 | 3 | kap)
rechtsform      = freiberuf      ; einzel, gmbh, ug, gbr, ohg, kg, ag, ...
besteuerungsart = ist            ; ist (Ist-Versteuerung) or soll
vorauszahlungen = 0

; Anlage G (Gewerbe). Inherits personal.taxnumber by default; uncomment
; the line below to override per-source (real test Steuernummern have a
; checksum digit, so we leave it inheriting here so the example validates).
[mygewerbe]
income          = gewerbe
; taxnumber     = 9198011310020   ; per-source override
rechtsform      = einzel
besteuerungsart = soll
vorauszahlungen = 100

; Anlage KAP — values are inline; no TSV needed.
[ibkr]
income               = kap
gains                = 1500.50
tax                  = 375.13
soli                 = 20.63
guenstigerpruefung   = 1
sparer_pauschbetrag  = 1000

; -------- Kids --------
; One section per child. The section name is the firstname and is used
; as the prefix for per-kid deduction codes (e.g. max174, max176).

[max]
birthdate                = 01.06.2018
idnr                     = 12345678901
kindschaftsverhaeltnis   = leiblich    ; to Person A (filer); leiblich | pflege | enkel
kindschaftsverhaeltnis_b = leiblich    ; to Person B (other parent)
parent_b_name            = Greta Maier ; other parent name (Einzelveranlagung only)
familienkasse            = Berlin      ; zust. Familienkasse fuer Kindergeld
kindergeld               = 2400

[lisa]
birthdate                = 15.03.2020
idnr                     = 98765432109
kindschaftsverhaeltnis   = leiblich
kindschaftsverhaeltnis_b = leiblich
parent_b_name            = Greta Maier
familienkasse            = Berlin
kindergeld               = 2400

; -------- [auth] (optional) --------
; Default behaviour with no [auth] section: viking looks next to this
; conf for "<basename>.pfx" + a "<basename>.pin*" file (see README).
;
; Override either or both here. Paths are resolved relative to this
; conf's directory; absolute paths stay as-is.
;
; For this example we use the public ELSTER test certificate. Symlink
; or copy it into this directory as `viking.pfx`, OR uncomment one of
; the alternatives below.

; [auth]
; cert   = viking.pfx          ; default
; pin    = viking.pin          ; default (plain text, contains "123456")
; pincmd = viking.pin.sh       ; alternative: any script that prints the PIN

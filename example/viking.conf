; Showcase viking.conf: every section, every alias, all the bells.
; Run `viking <command> -c viking.conf --test --dry-run` from this directory.
; (See README.md for setup and per-feature pointers.)

; -------- Personal (first section = taxpayer) --------
; Section name = Vornamen Nachname. Last word = Nachname, rest = Vornamen.
; Religion, rechtsform, versteuerung, verhaeltnis and the --period CLI
; flag accept German words or the original ELSTER numerics.

[Hans Maier]
geburtsdatum = 05.05.1955
idnr         = 04452397687
steuernr     = 9198011310010
strasse      = Musterstr.
nr           = 1
plz          = 10115
ort          = Berlin
iban         = DE91100000000123456789
religion     = rk             ; rk, ev, altkath, ev_ref, keine, ... (or 02..29)
beruf        = Software-Entwickler
krankenkasse = privat         ; privat (default) or gesetzlich

; -------- Spouse (optional, for Zusammenveranlagung) --------
; Any later person-named section with an `idnr` is treated as the
; co-filing spouse. Section name = spouse's full name.

[Greta Maier]
geburtsdatum = 12.07.1956
idnr         = 04452397688
religion     = ev
beruf        = Lehrerin

; -------- Income sources --------
; Reserved: freiberuf (Anlage S), gewerbe (Anlage G Einzelgewerbe).
; Otherwise: rechtsform inferred from a legal-form suffix in the section
; name (GmbH, UG, AG, KG, OHG, GbR, PartG, eK, eG, KGaA, SE,
; "GmbH & Co. KG", "AG & Co. KG", …). No suffix → Einzelgewerbe.
; Section name also names the per-source TSV: <year>-<section>.tsv.

; Anlage S (Selbstaendige Arbeit). Default owner is "personal".
[freiberuf]
versteuerung    = ist            ; ist (Ist-Versteuerung) or soll
vorauszahlungen = 0

; Anlage G (Einzelgewerbe). Inherits personal.steuernr by default; uncomment
; the line below to override per-source (real test Steuernummern have a
; checksum digit, so we leave it inheriting here so the example validates).
[gewerbe]
; steuernr      = 9198011310020  ; per-source override
versteuerung    = soll
vorauszahlungen = 100

; Anlage KAP — values inline, no TSV needed. Marker: guenstigerpruefung
; or pauschbetrag.
[ibkr]
guenstigerpruefung = 1
pauschbetrag       = 1000
gains              = 1500.50
tax                = 375.13
soli               = 20.63

; -------- Kids --------
; Marker: `verhaeltnis`. Section name = full name (last word = Nachname).
; Kid's first word (lowercased) is the deduction-code prefix, e.g. max174.

[Max Maier]
geburtsdatum       = 01.06.2018
idnr               = 12345678901
verhaeltnis        = leiblich    ; to Person A; leiblich | pflege | enkel
personb-verhaeltnis= leiblich    ; to Person B (other parent)
personb-name       = Greta Maier ; required on Einzelveranlagung
familienkasse      = Berlin      ; zust. Familienkasse fuer Kindergeld
kindergeld         = 2400

[Lisa Maier]
geburtsdatum       = 15.03.2020
idnr               = 98765432109
verhaeltnis        = leiblich
personb-verhaeltnis= leiblich
personb-name       = Greta Maier
familienkasse      = Berlin
kindergeld         = 2400

; -------- [auth] (optional) --------
; Default behaviour with no [auth] section: viking looks next to this
; conf for "<basename>.pfx" + a "<basename>.pin*" file (see README).
;
; Override either or both here. Paths are resolved relative to this
; conf's directory; absolute paths stay as-is.

; [auth]
; cert   = viking.pfx          ; default
; pin    = viking.pin          ; default (plain text, contains "123456")
; pincmd = viking.pin.sh       ; alternative: any script that prints the PIN

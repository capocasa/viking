; Showcase viking.conf: every section, every alias, all the bells.
; Run `viking <command> -c viking.conf --test --dry-run` from this directory.
; (See README.md for setup and per-feature pointers.)

; -------- Taxpayer (first [steuerzahler]) --------
; `name = Vornamen Nachname` (last word = Nachname, rest = Vornamen).
; Religion, versteuerung, verhaeltnis and the --period CLI flag accept
; German words or the original ELSTER numerics.

[steuerzahler]
name         = Hans Maier
year         = 2025           ; required — copy this whole directory per tax year
geburtsdatum = 05.05.1955
idnr         = 04452397687
steuernr     = 9198011310010
strasse      = Musterstr.
nr           = 1
plz          = 10115
ort          = Berlin
iban         = DE91100000000123456789
religion     = rk             ; rk, ev, altkath, ev_ref, keine, ... (or 02..29)
beruf        = Software-Entwickler
krankenkasse = privat         ; privat (default) or gesetzlich
abzuege      = abzuege.tsv    ; ESt abzuege TSV (vor/sa/agb/per-kid codes)

; -------- Spouse (optional, for Zusammenveranlagung) --------
; A second [steuerzahler] with a different `name=` is the co-filing
; spouse. Merging confs (global + CWD) use `name=` to decide merge vs.
; spouse — identical name merges, different name adds a spouse.

[steuerzahler]
name         = Greta Maier
geburtsdatum = 12.07.1956
idnr         = 04452397688
religion     = ev
beruf        = Lehrerin

; -------- Income sources --------
; One [einkommen] per source. `typ =` dispatches:
;   freiberuflich → Anlage S
;   gewerbe       → Anlage G (optional company name via `name=`;
;                   Rechtsform inferred from a trailing legal-form
;                   suffix: GmbH, UG, AG, KG, OHG, GbR, PartG, eK, eG,
;                   KGaA, SE, "GmbH & Co. KG", … No suffix → Einzel-
;                   gewerbe.)
;   kapital       → Anlage KAP (`name=` is the broker handle, required)
;   rente         → Anlage R   (`rente =` points at the row TSV)
;
; Each EÜR source points at its TSV of income + costs via `euer=`
; (optional; relative to this conf's dir). Sources without `euer=`
; submit zeros with a warning. No year substitution — copy this
; whole conf dir per tax year so each year's data stays pinned.

; Anlage S (Selbstaendige Arbeit). Default owner is "personal".
; `art` fills E6000017 (Art des Betriebs). Optional — defaults to
; "Dienstleistungen". Handy when the same taxpayer files both Anlage S
; (e.g. software consulting) and Anlage G (e.g. online sales) and wants
; each EÜR to describe itself correctly.
[einkommen]
typ             = freiberuflich
versteuerung    = ist                    ; ist (Ist-Versteuerung) or soll
art             = IT-Dienstleistungen
vorauszahlungen = 0
euer            = freelance.tsv

; Anlage G (Einzelgewerbe). Inherits personal.steuernr by default;
; uncomment the line below to override per-source (real test Steuer-
; nummern have a checksum digit, so we leave it inheriting here so the
; example validates).
[einkommen]
typ             = gewerbe
; steuernr      = 9198011310020          ; per-source override
versteuerung    = soll
art             = Online-Handel SaaS     ; max 25 chars (E6000017)
vorauszahlungen = 100
euer            = gewerbe.tsv

; Anlage KAP — values inline, no TSV needed. `name=` is required (the
; broker handle, used for per-source dispatch and logs). Optional KAP
; fields: kirchensteuer (KISTAM-Quellenabzug), auslaendische_quellensteuer
; (anrechenbar) / nicht_anrechenbar_aqs, verluste_aktien / verluste_sonstige.
; Günstigerprüfung implicitly claims the Sparer-Pauschbetrag (1000 € /
; 2000 €); `pauschbetrag` can still override.
[einkommen]
typ                        = kapital
name                       = ibkr
guenstigerpruefung         = 1
pauschbetrag               = 1000
gains                      = 1500.50
tax                        = 375.13
soli                       = 20.63
kirchensteuer              = 33.76
auslaendische_quellensteuer= 12.40

; Broker without German KapESt withholding (e.g. Wise interest, Revolut
; cashback, PSA-less IBKR dividends). `steuerabzug = no` makes it explicit;
; omitting it auto-detects from the absence of tax/soli/kirchensteuer.
; `ausland = 1` routes to Zeile 19 (Ausländische Kapitalerträge) instead
; of Zeile 18 (Inländische Kapitalerträge ohne Steuerabzug).
[einkommen]
typ                        = kapital
name                       = wise
gains                      = 18
guenstigerpruefung         = 1
; steuerabzug              = no           ; default-inferred when no tax set
; ausland                  = 1            ; only set for foreign brokers

; Anlage R (Renten und sonstige Leistungen). One row per payout in the
; TSV; see src/viking/rente.nim for the column layout.
[einkommen]
typ                        = rente
rente                      = rente.tsv

; -------- Kids --------
; One [kind] per child. `name=` is the full name (whitespace-split;
; hyphenated names like Ann-Kathrin stay one word):
;   1 word     Vorname only (Nachname implicitly the taxpayer's)
;   2 words    Vorname Nachname (Nachname omitted from E0500108 when
;              same as taxpayer's, emitted when it differs)
;   3+ words   Vorname middle(s) Nachname (to keep a middle name you
;              must spell out the Nachname even when it matches the
;              taxpayer's — otherwise the last word is parsed as it)
; First word (lowercased) is the abzuege-code prefix, e.g. max174.
;
; KBK household context (only relevant when a kid has a 174-code line
; in abzuege.tsv, i.e. Kinderbetreuungskosten claimed):
;   haushalt = a | b | beide     Kid in Person A's / Person B's / both
;                                households. Default: beide under
;                                Zusammenveranlagung, a under Einzel.
;   haushalt_eltern_getrennt = 0 | 1
;                                Only needed under Einzelveranlagung.
;                                Default: 1 (parents live separately).
;                                Cohabiting unmarried parents (same
;                                household, filing separately) override
;                                with `= 0` plus `haushalt = beide`.

[kind]
name               = Max Maier
geburtsdatum       = 01.06.2018
idnr               = 12345678901
verhaeltnis        = leiblich    ; to Person A; leiblich | pflege | enkel
personb-verhaeltnis= leiblich    ; to Person B (other parent)
personb-name       = Greta Maier ; required on Einzelveranlagung
familienkasse      = Berlin      ; zust. Familienkasse fuer Kindergeld
kindergeld         = 2400

[kind]
name               = Lisa Maier
geburtsdatum       = 15.03.2020
idnr               = 98765432109
verhaeltnis        = leiblich
personb-verhaeltnis= leiblich
personb-name       = Greta Maier
familienkasse      = Berlin
kindergeld         = 2400

; Born mid-year — Kindschaftsverhältnis auto-starts on the birth date
; (no need to set verhaeltnis_von). Optional date overrides, all DD.MM
; (the .YYYY suffix is tolerated but the year is always personal.year):
;   verhaeltnis_von   override auto-start (rarely needed)
;   verhaeltnis_bis   ends the relationship (aging out, adoption-out,
;                     death); default 31.12
;   wohnsitz_von / _bis  override Wohnsitz-im-Inland (defaults to the
;                     resolved Kindschaftsverhältnis range).
[kind]
name               = Luna Maier
geburtsdatum       = 15.03.2025
idnr               = 11111111111
verhaeltnis        = leiblich
personb-verhaeltnis= leiblich
personb-name       = Greta Maier
familienkasse      = Berlin
kindergeld         = 2000
; verhaeltnis_bis  = 30.06     ; e.g. if aged out or adopted out mid-year
; wohnsitz_bis     = 31.08     ; e.g. moved out while still a Kind

; -------- [auth] --------
; Signing material. Required for live submissions (not for --dry-run).
; Paths resolve relative to this conf's directory; absolute paths stay
; as-is.
;
; `cert`    — path to the .pfx (required).
; `pin`     — either a path to a plaintext PIN file, OR the PIN text
;             itself (inline; fine for the public sandbox PIN but keep
;             it out of version control for real submissions).
; `pincmd`  — shell command that prints the PIN on stdout. Runs with
;             this conf's directory as the working directory, so
;             `./viking.pin.sh`, `cat viking.pin`, `pass show elster/pin`,
;             `security find-generic-password -s elster -w`, and any
;             other shell snippet all work.
; Exactly one of `pin` or `pincmd` is required.

[auth]
cert   = viking.pfx             ; .pfx signing cert
pin    = viking.pin             ; plaintext PIN file (contains "123456")
; pin    = 123456               ; inline PIN (OK for the public test PIN)
; pincmd = ./viking.pin.sh      ; run the bundled script (prints the PIN)
; pincmd = pass show elster/pin ; or wrap your secret manager of choice
